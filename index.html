<!DOCTYPE html>     <!-- Δηλώνει στον browser ότι το έγγραφο είναι HTML5. -->

<html>       <!-- Το ριζικό στοιχείο. Όλο το έγγραφο βρίσκεται μέσα σε αυτό. -->

<head>       <!-- Το head περιέχει πληροφορίες για τη σελίδα, όχι περιεχόμενο που φαίνεται στον χρήστη. -->
 <meta charset="UTF-8">     <!-- Δηλώνει χρήση UTF-8 κωδικοποίησης. Επιτρέπει ελληνικά, σύμβολα, νομίσματα κτλ. -->
 <title>Mini Expenses</title>    <!-- Ο τίτλος που εμφανίζεται στο tab του browser. -->
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

  /* =================================
   Καθολικός κανόνας υπολογισμού κουτιού
  ==================================== */

   * {
    box-sizing: border-box;
   } 


  /* ===============================
   Βασική μορφοποίηση σελίδας
   ================================= */

  body {
    font-family: Arial, sans-serif;   /* Καθαρή γραμματοσειρά */
    background-color: #f4f6f8;        /* Απαλό γκρι φόντο */
    margin: 0;      /* Εξωτερικό περιθώριο: απόσταση του στοιχείου από τα άλλα στοιχεία */
    padding: 0;     /* Εσωτερικό περιθώριο: κενός χώρος ανάμεσα στο περιεχόμενο και τα όρια του στοιχείου */
    align-items: center;
  }  

  /* ===============================
   Πλαίσιο φόρμας (Card)
   ================================= */

  .section {
      background-color: white; /* Λευκό φόντο, δημιουργεί λευκό κουτί. */      
      width: 100%;            /* Πάρε όλο το διαθέσιμο πλάτος του container σου (μόνο για κινητό)*/      
      max-width: 420px;        /* Καθορισμός μεγίστου πλάτους */
      /* width: 420px;            Καθορισμός σταθερού πλάτους */
      /* max-width: 95%;*/
      /* margin: 40px auto;            40px πάνω-κάτω, auto αριστερά-δεξιά (οριζόντιο κεντράρισμα) */
      margin: 10px 10px 10px 10px;     /* Πάνω  Δεξιά  Κάτω  Αριστερά  : αριστερή στοίχιση */
      /* margin: 10px 0 0 10px;        Εναλλακτικός τρόπος για την αριστερή στοίχιση */
      padding: 20px;                   /* Εσωτερικός χώρος, αέρας μέσα στο κουτί */
      border: 1px solid #ccc;          /* Λεπτό γκρι περίγραμμα */
      border-radius: 8px;              /* Ελαφρώς στρογγυλεμένες γωνίες */
      /* Συνολικό πλάτος = 400 + 20 + 20 = 440. Το padding προστίθεται στο εξωτερικό μέγεθος, δεν μεγαλώνει το εσωτερικό κουτί. Μεγαλώνει το συνολικό ορατό μέγεθος. */
      align-content: center;
  }

   /* ===============================
   Ευθυγράμμιση πεδίων φόρμας
   ================================= */

   /* Το flex προέρχεται από το flexible = ευέλικτο. Είναι σύστημα διάταξης (layout system), που επιτρέπει στα στοιχεία να τοποθετούνται ευέλικτα μέσα σε ένα κουτί. */ 

   h1 {
    max-width: 420px;      /* ίδιο με της φόρμας */
    /* margin: 20px auto;  auto = κεντράρισμα */
    text-align: center;
    margin-bottom: 10px;
  }

  .form-row {
      display: flex;              /* Βάζουμε label και input στην ίδια γραμμή, τα ευθυγραμμίζουμε. */
      align-items: center;        /* Κατακόρυφη ευθυγράμμιση */
      margin-bottom: 10px;        /* Απόσταση μεταξύ γραμμών */
  }

  .form-row label {
      width: 105px;                /* Καθορισμός Σταθερού πλάτους για όλα τα labels */
      font-weight: bold;          /* Λίγο πιο έντονα γράμματα */
  }

  .form-row input {
      flex: 1;                    /* Το input καταλαμβάνει όλο τον διαθέσιμο χώρο της γραμμής. */
      padding: 6px;
  }  


  /* ===============================
   Κεντράρισμα κουμπιών
  ================================= */

  .button-row {
    display: flex;
    flex-wrap: wrap;   /* επιτρέπει να σπάνε γραμμή */
    gap: 6px;          /* απόσταση μεταξύ κουμπιών */
    margin-top: 0px;    
    /* margin-left: 20px;  Ξεκινάνε από αριστερά  */
    margin-bottom: 14px;
    justify-content: center;  /* κεντράρισμα των κουμπιών οριζόντια, align-items = κάθετη στοίχιση */
                      /* justify-content: flex-start (αριστερά), justify-content: flex-end (δεξιά) */
  }


  .button-row1 {
    display: flex;
    flex-wrap: wrap;   /* επιτρέπει να σπάνε γραμμή */
    gap: 1px;          /* απόσταση μεταξύ κουμπιών */
    margin-top: 0px;    
    /* margin-left: 20px;  Ξεκινάνε από αριστερά  */
    margin-bottom: 5px;
    justify-content: flex-start;  /* κεντράρισμα των κουμπιών οριζόντια, align-items = κάθετη στοίχιση */
                      /* justify-content: flex-start (αριστερά), justify-content: flex-end (δεξιά) */
                      /* justify-content: center (κέντρο) */
  }

  
  .button-row + .button-row {
    margin-top: 1px;   /* Μικρό κενό μόνο μεταξύ των δύο σειρών */
  }

 


   /* ===============================
   Μορφοποίηση κουμπιών
   ================================= */

  .button-row button {
      padding: 1px 2px;         /* Εσωτερικός χώρος */
      border: 1px solid #bbb;
      background-color: #f8f9fa;
      border-radius: 4px;        /* Στρογγύλεμα των γωνιών των κουμπιών, όσο > αριθμός => > στρογγύλεμα.*/
      cursor: pointer;           /* Δείχνει ότι είναι clickable */
      padding: 4px 8px;
      font-size: 13px;
  }



  .button-row button:hover {    /* Όταν το ποντίκι πάει πάνω από το κουμπί→ άλλαξε το background.*/
    background-color: #e2e6ea;  /* Αλλαγή χρώματος στο hover */
  }

    

  /* Wrapper για scroll σε κινητό */
  .table-wrapper {
      overflow-x: auto;
  }

  /* Μορφοποίηση πίνακα */
  .data-table {      
      width: 100%;            /* Πάρε όλο το διαθέσιμο πλάτος του container σου (μόνο για κινητό)*/      
      max-width: 450px;        /* Καθορισμός μεγίστου πλάτους */
      border-collapse: collapse;
      /* min-width: 700px;  κρατάει σωστό πλάτος σε desktop */
  }

  .bar {
  background: #eee;
  height: 8px;
  width: 100%;
  margin-top: 4px;
  border-radius: 4px;
}

.bar-fill {
  background: #4CAF50;
  height: 100%;
  border-radius: 4px;
}

  .data-table th,
  .data-table td {
      border: 1px solid #ccc;
      padding: 6px;
      font-size: 13px;
  }

  /* Κεφαλίδες κεντραρισμένες */
  .data-table th {
      background-color: #f0f0f0;
      text-align: center;
  }

  /* Περιεχόμενα στο  κέντρο */
  .data-table td {
      text-align: center;
  }

  /* Ποσά δεξιά */
  .data-table td.amount-cell {
      text-align: right;
  }

  /* Προμηθευτές αριστερά */
  .data-table td.supplier-cell {
      text-align: left;
  }

  .header-filter {
      width: 18px;          /* μικρό */
      padding: 0;
      font-size: 11px;
      border: none;
      background: transparent;
      cursor: pointer;
  }

  /* Για να μη μεγαλώνει η στήλη */
  .header-filter:focus {
      width: auto;          /* ανοίγει μόνο όταν το πατήσεις */
      background: white;
      border: 1px solid #ccc;
  }  

  #resultsInfo {
    font-size: 11px;        /* πολύ μικρό */
    font-weight: normal;    /* όχι bold */
    color: #555;            /* πιο ήπιο */
    margin-top: 10px;       /* να φύγει πιο κάτω */
    margin-bottom: 4px;
 }

 .data-transfer {
    display: flex;
    flex-wrap: wrap;   /* επιτρέπει να σπάνε γραμμή */
    gap: 6px;          /* απόσταση μεταξύ κουμπιών */
    margin-top: 6px;
   padding: 6px;
 }


 .status-bar {
    margin-top: 12px;
    padding: 6px 8px;
    font-size: 11px;
    color: #555;
    background-color: #f8f9fa;
    border-top: 1px solid #ddd;
    border-radius: 0 0 6px 6px;
}


</style>

</head>



<body>                      <!-- Το body περιέχει Ο,ΤΙ φαίνεται στην οθόνη. -->

<h1>My Expenses</h1>      <!-- Επικεφαλίδα επιπέδου 1. Είναι σημασιολογικό στοιχείο (semantic). -->    

<div class="button-row1">
      <button type="button" id="toggleTableBtn">Hide Records</button> <!-- ΚΟΥΜΠΙ ΓΙΑ ΚΡΥΨΙΜΟ ΠΙΝΑΚΑ -->
      <button type="button" id="summaryBtn">Categories_sum</button> <!--ΚΟΥΜΠΙ ΓΙΑ ΣΥΓΚ.ΠΙΝΑΚΑ -->
      <button type="button" id="paymentBtn">Payments_sum</button> <!--ΚΟΥΜΠΙ ΓΙΑ ΣΥΓΚ.ΠΙΝΑΚΑ -->
      <button type="button" id="supplierBtn">Suppliers_sum</button> <!--ΚΟΥΜΠΙ ΓΙΑ ΣΥΓΚ.ΠΙΝΑΚΑ -->
      <button type="button" id="monthBtn">Months_sum</button>  <!--ΚΟΥΜΠΙ ΓΙΑ ΣΥΓΚ.ΠΙΝΑΚΑ -->
      <button type="button" id="yearBtn">Years_sum</button>  <!--ΚΟΥΜΠΙ ΓΙΑ ΣΥΓΚ.ΠΙΝΑΚΑ -->
</div>

<div id="resultsInfo" style="margin-bottom:8px; font-weight:bold;"></div>

<form>   <!-- Η φόρμα ομαδοποιεί πεδία εισαγωγής.  Δεν κάνει ακόμη τίποτα. Απλώς οργανώνει δεδομένα. -->

  
  <div class="section">
    
    <div class="button-row">       
        <button type="button" id="saveBtn">💾</button>
        <button type="button" id="newBtn">➕</button>
        <button type="button" id="delBtn">🗑️</button>
        <button type="button" id="firstBtn">⏮️</button>
        <button type="button" id="previousBtn">◀️</button>
        <button type="button" id="nextBtn">▶️</button>
        <button type="button" id="lastBtn">⏭️</button>       
    </div>  
    
    <div class="form-row">    <!-- Το div είναι δομικό κουτί, για ομαδοποίηση στοιχείων. -->
        <label>Date</label>  
        <input type="date" id="date"> <!-- Πεδίο ημερομηνίας.Το type καθορίζει τη συμπεριφορά. -->
    </div>

    <div class="form-row">
        <label>Document</label>
        <input type="text" id="document" list="documentList">   <!-- ΠΕΔΙΟ ΛΙΣΤΑΣ ΤΙΜΩΝ -->
        <datalist id="documentList">
             <!-- Οι επιλογές θα μπαίνουν δυναμικά, βάζουμε μερικές τώρα. -->
             <option value="ΑΠΟΔΕΙΞΗ">
             <option value="ΤΙΜΟΛΟΓΙΟ">
             <option value="ΑΝΕΥ">
        </datalist>
    </div>
    
    <div class="form-row">
        <label>Payment</label>
        <input type="text" id="payment" list="paymentList">   <!-- ΠΕΔΙΟ ΛΙΣΤΑΣ ΤΙΜΩΝ -->
        <datalist id="paymentList">
             <!-- Οι επιλογές θα μπαίνουν δυναμικά, βάζουμε μερικές τώρα. -->
             <option value="Μετρητοίς">
             <option value="Κάρτα">
             <option value="E-banking">
        </datalist>
    </div>


    <div class="form-row">
        <label>Supplier</label>
        <input type="text" id="supplier">  <!-- Πεδίο κειμένου -->      
    </div>

    <div class="form-row">
        <label>Category</label>
        <input type="text" id="category" list="categoryList">   <!-- ΠΕΔΙΟ ΛΙΣΤΑΣ ΤΙΜΩΝ -->
        <datalist id="categoryList">
             <!-- Οι επιλογές θα μπαίνουν δυναμικά, βάζουμε μερικές τώρα. -->
             <option value="ΤΡΟΦΙΜΑ">
             <option value="ΚΑΥΣΙΜΑ">
             <option value="ΕΝΟΙΚΙΟ">
        </datalist>
    </div>

    <div class="form-row">
        <label>Amount</label>
        <input type="number" id="amount">        
    </div>
     
      
    
    <div class="status-bar" id="statusBar"></div>
    
  

</div>  

</form>

<hr>


<!-- <h3>Όλες οι Εγγραφές</h3> -->
<div id="tableContainer"></div>
<div id="summaryContainer" style="margin-top:15px;"></div>
<div id="summary2Container" style="margin-top:15px;"></div>
<div id="summary3Container" style="margin-top:15px;"></div>
<div id="summaryMonthContainer" style="margin-top:15px;"></div>
<div id="summaryYearContainer" style="margin-top:15px;"></div>

<!-- Πλαίσιο Εισαγωγής-Εξαγωγής -->
<div class="data-transfer">
  <button onclick="exportData()">Εξαγωγή</button>
  <button onclick="importData()">Εισαγωγή</button>
  <input type="file" id="importFile" accept=".json" hidden>
</div>



<script>

// localStorage.clear();   // Πλήρης καθαρισμός localStorage για αυτό το αρχείο    
    
let records = [];  // Πίνακας που θα κρατά τις εγγραφές (σαν πίνακας Access)
let currentIndex = -1;  // // Δείκτης θέσης της τρέχουσας εγγραφής (καμία εγγραφή επιλεγμένη στην αρχή)
                         // Το -1 σημαίνει καμιά εγγραφή, το 0 σημαίνει η πρώτη εγγραφή.

let selectedCategory = "all";   
let selectedSupplier = "all";  // ..a.....
let selectedPayment = "all";  // ..a1.....

// ================================
// Φόρτωση δεδομένων από localStorage
// ================================

const STORAGE_KEY = "miniExpensesRecords";         // όνομα–κλειδί (key) με το οποίο θα 
let savedData = localStorage.getItem(STORAGE_KEY); // αποθηκεύσουμε τα δεδομένα στο localstorage

if (savedData) {                       // Εάν υπάρχουν δεδομένα,
    records = JSON.parse(savedData);   // φορτώνονται, μετατρέποντας το string πίσω σε πίνακα
    currentIndex = records.length - 1;
    if (records.length > 0) displayRecord();
}

// ================= SAVE =================
document.getElementById("saveBtn").addEventListener("click", function () {

    let categoryValue = document.getElementById("category").value.trim();
    let dataList1 = document.getElementById("categoryList"); // Ορισμός μεταβλητής με τις τιμές της Λίστας Κατηγοριών

    // Έλεγχος αν η κατηγορία που γράψαμε στο πεδίο Λίστας υπάρχει ήδη στη λίστα Κατηγοριών
    let exists = false;
    
    // Αν υπάρχει, δεν την προσθέτουμε
    for (let option of dataList1.options) {
        if (option.value === categoryValue) {
            exists = true;
            break;
        }
    }

    // Αν δεν υπάρχει και δεν είναι κενή, την προσθέτουμε
    if (!exists && categoryValue !== "") {
        let newOption = document.createElement("option");  // Ορίζουμε μια μεταβλητή(newOption)
        newOption.value = categoryValue;                   // Παίρνει την τιμή που γράψαμε
        dataList1.appendChild(newOption);                  // Την προσθέτει στη λίστα
    }

    // .............Εδώ τελειώνει η διαδικασία που αφορά το πεδίο της Λίστας  Κατηγοριών.


    // Δημιουργούμε αντικείμενο εγγραφής
    let record = {
        date: document.getElementById("date").value,
        document: document.getElementById("document").value,        
        payment: document.getElementById("payment").value,
        supplier: document.getElementById("supplier").value,
        category: categoryValue,
        amount: parseFloat(document.getElementById("amount").value)
    };

    // Το βάζουμε στον πίνακα
    if (currentIndex === -1) {     // Αν δεν είμαστε πάνω σε υπάρχουσα εγγραφή → ΝΕΑ
        records.push(record);
        currentIndex = records.length - 1;  // Μετακινούμαστε στην τελευταία εγγραφή που μόλις αποθηκεύτηκε
    } else {                                // Αν είμαστε πάνω σε υπάρχουσα → UPDATE
        records[currentIndex] = record;
    }

    // Αποθήκευση στο localStorage
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));  // Πάρε τον πίνακα records,
         // μετέτρεψέ τον σε string, αποθήκευσέ τον μόνιμα στο local σαν miniExpensesRecords. Το JSON είναι η «γλώσσα μεταφοράς δεδομένων» του διαδικτύου.                                                    
    displayRecord();    // Εμφανίζουμε την εγγραφή που μόλις αποθηκεύτηκε
    renderTable(records);

    // ===== STATUS MESSAGE =====
    let status = document.getElementById("statusBar");
    status.textContent = "Η εγγραφή αποθηκεύτηκε";
});




// ================= NEW =================
document.getElementById("newBtn").addEventListener("click", function () {
    currentIndex = -1;
    document.querySelectorAll("input").forEach(i => i.value = "");  // Καθαρισμός όλων των πεδίων
});



// ================= DELETE =================
document.getElementById("delBtn").addEventListener("click", function () {

    if (currentIndex === -1) return;        // Αν δεν υπάρχουν εγγραφές, καμία ενέργεια

    records.splice(currentIndex, 1);        // Σβήσιμο της τρέχουσας εγγραφής

    if (currentIndex >= records.length)     // Αν σβήσαμε την τελευταία
        currentIndex = records.length - 1;  // Πηγαίνουμε στη νέα τελευταία

    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));  // 👉 ΕΝΗΜΕΡΩΣΗ localStorage

    if (records.length > 0) displayRecord(); // Αν υπάρχουν εγγραφές, να εμφανιστεί η τρέχουσα
    else document.querySelectorAll("input").forEach(i => i.value = ""); // αλλιώς, καθαρισμός πεδίων

    renderTable(records);

    // ===== STATUS MESSAGE =====
    let status = document.getElementById("statusBar");
    status.textContent = "Η εγγραφή διαγράφηκε";
});





// ================= NAVIGATION =================
// document.getElementById("previousBtn").addEventListener("click", function() {
document.getElementById("previousBtn").onclick = () => {  // Το ιδιο πράγμα με την πάνω γραμμή
    if (currentIndex > 0) {   // Αν δεν είμαστε στην πρώτη εγγραφή
        currentIndex--;       // Πηγαίνουμε μία πίσω
        displayRecord();      // Την εμφανίζουμε
    }
};

document.getElementById("nextBtn").onclick = () => {  
    if (currentIndex < records.length - 1) {    // Αν δεν είμαστε στην τελευταία εγγραφή
        currentIndex++;                         // Πηγαίνουμε μία μπροστά
        displayRecord();                        // Την εμφανίζουμε
    }
};

document.getElementById("firstBtn").onclick = () => {
    if (records.length > 0) {   // Αν υπάρχει τουλάχιστον μια εγγραφή: (currentIndex > - 1)
        currentIndex = 0;       // Πηγαίνουμε στην πρώτη εγγραφή.
        displayRecord();        // Την εμφανίζουμε  
    }
};

document.getElementById("lastBtn").onclick = () => {
    if (records.length > 0) {    // Αν υπάρχει τουλάχιστον μια εγγραφή: (currentIndex > - 1)
        currentIndex = records.length - 1;  // Πηγαίνουμε στην τελευταία εγγραφή
        displayRecord();                    // Την εμφανίζουμε
    }
};

// ================= DISPLAY =================
function displayRecord() {

    //    "||" = "Or",  "&&" = "And",  "!" = "Not"
    if (currentIndex < 0 || currentIndex >= records.length) return;  // 0 εγγραφές => τίποτε

    let record = records[currentIndex];   // // Παίρνουμε την τρέχουσα εγγραφή από τον πίνακα

    // Γεμίζουμε τα πεδία της φόρμας με τα στοιχεία της εγγραφής
    document.getElementById("date").value = record.date;
    document.getElementById("document").value = record.document;    
    document.getElementById("payment").value = record.payment;
    document.getElementById("supplier").value = record.supplier;
    document.getElementById("category").value = record.category;
    document.getElementById("amount").value = record.amount;

    let status = document.getElementById("statusBar");

    if (records.length === 0) {
        status.textContent = "Δεν υπάρχουν εγγραφές";
    } else {
        status.textContent = "Εγγραφή " + (currentIndex + 1) + " από " + records.length;
    }
}



// ================= RENDER TABLE =================
function renderTable(dataArray) {

    let container = document.getElementById("tableContainer");

    // Αν δεν υπάρχουν δεδομένα
    if (dataArray.length === 0) {
        container.innerHTML = "<p>Δεν υπάρχουν εγγραφές.</p>";
        return;
    }

    let html = "<div class='table-wrapper'><table class='data-table'>";

    // Κεφαλίδες
    html += "<tr>";
    html += "<th>Date</th>";
    // html += "<th>Document</th>";    
    // html += "<th>Payment</th>";
    // html += "<th>Supplier</th>";

    html += "<th style='white-space:nowrap;'>Payment <select id='paymentHeaderFilter' class='header-filter'></select></th>";    //  ........c1..........
    
    html += "<th style='white-space:nowrap;'>Supplier <select id='supplierHeaderFilter' class='header-filter'></select></th>";    //  ........c..........
   
    html += "<th style='white-space:nowrap;'>Category <select id='categoryHeaderFilter' class='header-filter'></select></th>";     
    
    html += "<th>Amount</th>";
    html += "</tr>";

    let total = 0;

    // Γραμμές δεδομένων
    for (let record of dataArray) {

        if (selectedCategory !== "all" && record.category !== selectedCategory)
            continue;

        if (selectedSupplier !== "all" && record.supplier !== selectedSupplier) // ..d......
            continue;
        if (selectedPayment !== "all" && record.payment !== selectedPayment) // ..d1......
            continue;


        html += "<tr>";
        html += "<td>" + record.date + "</td>";
        // html += "<td>" + record.document + "</td>";        
        html += "<td>" + record.payment + "</td>";
        html += "<td class='supplier-cell'>" + record.supplier + "</td>";
        html += "<td>" + record.category + "</td>";
        html += "<td class='amount-cell'>" + record.amount + "</td>";
        html += "</tr>";

        total += Number(record.amount) || 0;   // Υπολογισμός συνόλου
    }

    html += "<tr>";
    html += "<td colspan='4' style='text-align:right;font-weight:bold;'>Total</td>";
    html += "<td class='amount-cell' style='font-weight:bold;'>" + total.toFixed(2) + "</td>";
    html += "</tr>";

    html += "</table></div>";

    container.innerHTML = html;

    // ===== Header Filter =====
    let select_1 = document.getElementById("categoryHeaderFilter");
    let select_2 = document.getElementById("supplierHeaderFilter");   //....e......
    let select_3 = document.getElementById("paymentHeaderFilter");   //....e1......

    select_1.innerHTML = "<option value='all'>Όλες</option>";
    select_2.innerHTML = "<option value='all'>Όλες</option>";     //......f......
    select_3.innerHTML = "<option value='all'>Όλες</option>";     //......f1......

    let categories = [...new Set(records.map(r => r.category))];
    categories.sort();

    let suppliers = [...new Set(records.map(r => r.supplier))];  // .......g........
    suppliers.sort();
    let payments = [...new Set(records.map(r => r.payment))];  // .......g1........
    payments.sort();

    for (let cat of categories) {
        let option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        select_1.appendChild(option);
    }

    for (let cat of suppliers) {                        //......h........
        let option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        select_2.appendChild(option);
    }

    for (let cat of payments) {                        //......h1........
        let option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        select_3.appendChild(option);
    }

    select_1.value = selectedCategory;
    select_2.value = selectedSupplier;               //.....i.......
    select_3.value = selectedPayment;                //.....i1.......


    select_1.onchange = function () {
        selectedCategory = this.value;
        renderTable(records);
    };

    select_2.onchange = function () {              //........k.........
        selectedSupplier = this.value;
        renderTable(records);
    };

    select_3.onchange = function () {              //........k1.........
        selectedPayment = this.value;
        renderTable(records);
    };


    // ΤΙΤΛΟΣ ΠΙΝΑΚΑ ΑΝΑΛΟΓΑ ΜΕ ΤΑ ΦΙΛΤΡΑΡΙΣΜΑΤΑ
    let activeFilters = [];

    if (selectedCategory !== "all")
        activeFilters.push(selectedCategory);

    if (selectedSupplier !== "all")
        activeFilters.push(selectedSupplier);

    if (selectedPayment !== "all")
        activeFilters.push(selectedPayment);

    let filterText = "";

    if (activeFilters.length > 0)
        filterText = "Φιλτράρισμα κατά " + activeFilters.join(" , ");
    else
        filterText = " ";

    document.getElementById("resultsInfo").innerText = filterText;

}

// ΣΥΝΑΡΤΗΣΗ ΕΞΑΓΩΓΗΣ ΔΕΔΟΜΕΝΩΝ
function exportData() {
    const data = localStorage.getItem("miniExpensesRecords");
    if (!data) {
        alert("Δεν υπάρχουν δεδομένα για εξαγωγή.");
        return;
    }

    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "mini-expenses-backup.json";
    a.click();

    URL.revokeObjectURL(url);
}


// ΣΥΝΑΡΤΗΣΗ ΕΙΣΑΓΩΓΗΣ ΔΕΔΟΜΕΝΩΝ
function importData() {
    const fileInput = document.getElementById("importFile");
    fileInput.click();

    fileInput.onchange = function () {
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
            try {
                const importedData = JSON.parse(e.target.result);

                if (!confirm("Η εισαγωγή θα αντικαταστήσει όλα τα υπάρχοντα δεδομένα. Συνέχεια;"))
                    return;

                localStorage.setItem("miniExpensesRecords", JSON.stringify(importedData));
                alert("Η εισαγωγή ολοκληρώθηκε.");
                location.reload();
            } catch (error) {
                alert("Μη έγκυρο αρχείο JSON.");
            }
        };

        reader.readAsText(file);
    };
}

// ================= SUMMARY BY MONTH =================
let summaryMonthVisible = false;

document.getElementById("monthBtn").addEventListener("click", function () {

    let container = document.getElementById("summaryMonthContainer");

    if (summaryMonthVisible) {
        container.style.display = "none";
        this.textContent = "Months_sum";
        summaryMonthVisible = false;
        return;
    }

    if (records.length === 0) {
        container.innerHTML = "<p>Δεν υπάρχουν δεδομένα.</p>";
        return;
    }

    let totalsByMonth = {};
    let grandTotal = 0;

    for (let record of records) {

        if (!record.date) continue;

        let date = new Date(record.date);
        let month = date.getMonth();       // 0-11
        let year = date.getFullYear();

        let key = year + "-" + month;      // τεχνικό κλειδί για ταξινόμηση
        let label = greekMonths[month] + " " + year;

        let amount = Number(record.amount) || 0;

        if (!totalsByMonth[key]) {
            totalsByMonth[key] = {
                label: label,
                total: 0
            };
        }

        totalsByMonth[key].total += amount;
        grandTotal += amount;
    }

    let html = "<div class='table-wrapper'><table class='data-table'>";
    html += "<tr><th>Month</th><th>Amount</th><th>%</th><th>Graph</th></tr>";

    // Μετατρέπουμε σε array
    let sortedMonths = Object.entries(totalsByMonth);

    // Χρονολογική ταξινόμηση
    sortedMonths.sort((a, b) => {
        return new Date(a[0]) - new Date(b[0]);
    });

    for (let [key, data] of sortedMonths) {

        let percent = (data.total / grandTotal) * 100;

        html += "<tr>";
        html += "<td>" + data.label + "</td>";
        html += "<td class='amount-cell'>" + data.total.toFixed(2) + "</td>";
        html += "<td>" + percent.toFixed(2) + "%</td>";

        html += "<td>";
        html += "<div class='bar'>";
        html += "<div class='bar-fill' style='width:" + percent.toFixed(2) + "%'></div>";
        html += "</div>";
        html += "</td>";
        html += "</tr>";
    }

    html += "<tr>";
    html += "<td style='font-weight:bold;'>Total</td>";
    html += "<td class='amount-cell' style='font-weight:bold;'>" + grandTotal.toFixed(2) + "</td>";
    html += "<td style='font-weight:bold;'>100.00%</td>";
    html += "<td></td>";
    html += "</tr>";

    html += "</table></div>";

    container.innerHTML = html;
    container.style.display = "block";
    this.textContent = "Hide Months";
    summaryMonthVisible = true;
});
